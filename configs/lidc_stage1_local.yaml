# LIDC stage 1: local MLP denoiser.
# Run with: torchrun ... train.py --config lidc_stage1_local.yaml --from_scratch

stage:
  name: "stage1_local_denoiser"

data:
  image_size: 128
  path: "./data/"
  task: "lidc"
  target_path: "LIDC-HDF5-256"
  num_workers: 4
  train_txt: "./data_list/train.txt"
  test_txt: "./data_list/test.txt"
  ct_min: 0
  ct_max: 2500
  augment: true
  normalize: true

model:
  name: "DiT-B/12/0"
  num_classes: 1
  in_channels: 1
  out_channels: 2
  pretrained_path: ""
  flash_attn: false

training:
  batch_size: 48
  learning_rate: 1e-4
  epochs: 8000
  seed: 192
  gradient_clip: 1.0
  conditions: false

output:
  results_dir: "results"

logging:
  log_every: 400
  ckpt_every: 1000
  eval_every: 1000

wandb:
  project: ""
  entity: ""
  tags: ""
  enable: false
