# LIDC downstream task: volumetric infilling.

data:
  image_size: 128
  path: "./data/"
  task: "lidc"
  target_path: "LIDC-HDF5-256"
  num_workers: 4
  train_txt: "./data_list/train.txt"
  test_txt: "./data_list/test.txt"
  ct_min: 0
  ct_max: 2500
  augment: false
  normalize: true

model:
  name: "DiT-B/12/12"
  num_classes: 1
  in_channels: 1
  out_channels: 2
  pretrained_path: "pretrained/tf_prdit_lidc.pt"
  flash_attn: true

training:
  seed: 192

sampling:
  num_sampling_steps: 1000
  output_dir: "outputs_infilling"
  save_intermediate: false

downstream:
  task: "infilling"
  mask_type: "center_cube"
  missing_ratio: 0.50
  measurement_space: "volume"
  guidance_scale: 0.70
  noise_weight: 0.95
