# LIDC stage 2: global transformer residual path.
# Set model.pretrained_path to the best stage-1 local denoiser checkpoint.

stage:
  name: "stage2_global_residual"

data:
  image_size: 128
  path: "./data/"
  task: "lidc"
  target_path: "LIDC-HDF5-256"
  num_workers: 4
  train_txt: "./data_list/train.txt"
  test_txt: "./data_list/test.txt"
  ct_min: 0
  ct_max: 2500
  augment: true
  normalize: true

model:
  name: "DiT-B/12/12"
  num_classes: 1
  in_channels: 1
  out_channels: 2
  pretrained_path: "" # filling into the stage 1 weights.
  flash_attn: true

training:
  batch_size: 48
  learning_rate: 6e-5
  fine_tune_lr: 6e-6
  epochs: 20000
  seed: 192
  gradient_clip: 1.0
  conditions: false

output:
  results_dir: "results"

logging:
  log_every: 400
  ckpt_every: 1000
  eval_every: 1000

wandb:
  project: ""
  entity: ""
  tags: ""
  enable: false
