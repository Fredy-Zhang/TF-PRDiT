# RAD-ChestCT stage 1: local MLP denoiser.
# Run with: torchrun ... train.py --config rad_chest_stage1_local.yaml --from_scratch

stage:
  name: "stage1_local_denoiser"

data:
  image_size: 128
  path: "./data/"
  task: "rad_chestCT"
  num_workers: 4
  augment: false
  normalize: true

model:
  name: "DiT-XL/12/0"
  num_classes: 1
  in_channels: 1
  out_channels: 2
  pretrained_path: ""
  flash_attn: false

training:
  batch_size: 64
  learning_rate: 1e-4
  epochs: 6000
  seed: 42
  gradient_clip: 1.0
  conditions: false

output:
  results_dir: "results"

logging:
  log_every: 400
  ckpt_every: 1000
  eval_every: 1000

wandb:
  project: ""
  entity: ""
  tags: ""
  enable: false
